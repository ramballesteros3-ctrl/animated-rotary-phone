
<style>
  .wf { font-family: var(--font-sans); background: #F5F4F0; border-radius: 12px; padding: 24px; }
  .wf-browser { background: white; border: 1.5px solid #D0CEC8; border-radius: 10px; overflow: hidden; }
  .wf-chrome { background: #ECEAE4; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1.5px solid #D0CEC8; }
  .wf-dot { width: 8px; height: 8px; border-radius: 50%; background: #D0CEC8; }
  .wf-bar { flex: 1; height: 18px; background: white; border: 1px solid #D0CEC8; border-radius: 4px; margin: 0 8px; }
  .wf-topbar { background: #1C1C1C; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
  .wf-logo { width: 80px; height: 12px; background: rgba(255,255,255,0.15); border-radius: 3px; }
  .wf-nav-items { display: flex; gap: 16px; }
  .wf-nav-item { width: 50px; height: 10px; background: rgba(255,255,255,0.12); border-radius: 3px; }
  .wf-nav-item.short { width: 30px; }
  .wf-metabar { background: #2E2E2E; padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
  .wf-meta-tag { width: 24px; height: 18px; background: rgba(255,255,255,0.15); border-radius: 3px; }
  .wf-meta-pill { height: 10px; background: rgba(255,255,255,0.1); border-radius: 3px; }
  .wf-meta-status { margin-left: auto; width: 48px; height: 18px; background: #1D9E75; border-radius: 3px; opacity: 0.7; }
  .wf-body { background: #FAFAF8; padding: 16px; }
  .wf-cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .wf-card { border: 1.5px dashed #C8C6C0; border-radius: 8px; padding: 12px; min-height: 90px; display: flex; flex-direction: column; justify-content: space-between; background: white; }
  .wf-card.active { border: 1.5px solid #1D9E75; background: #F0FAF6; }
  .wf-card.done { background: #F5F4F0; border-style: solid; border-color: #D0CEC8; }
  .wf-card-title { width: 70%; height: 10px; background: #D0CEC8; border-radius: 3px; margin-bottom: 6px; }
  .wf-card-title.active { background: #1D9E75; opacity: 0.4; }
  .wf-card-sub { width: 50%; height: 8px; background: #E0DED8; border-radius: 3px; }
  .wf-card-status { display: flex; align-items: center; gap: 4px; margin-top: 10px; }
  .wf-status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .wf-status-label { height: 8px; border-radius: 3px; }
  .wf-panel { border: 1.5px solid #D0CEC8; border-radius: 8px; overflow: hidden; background: white; }
  .wf-panel-header { background: #F5F4F0; padding: 10px 14px; border-bottom: 1px solid #D0CEC8; display: flex; align-items: center; justify-content: space-between; }
  .wf-panel-title { width: 120px; height: 10px; background: #C8C6C0; border-radius: 3px; }
  .wf-panel-close { width: 14px; height: 14px; border: 1.5px solid #C8C6C0; border-radius: 50%; }
  .wf-panel-body { display: grid; grid-template-columns: 1fr 220px; }
  .wf-panel-left { padding: 14px; border-right: 1px solid #E0DED8; }
  .wf-tabs { display: flex; gap: 14px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #E0DED8; }
  .wf-tab { height: 8px; border-radius: 3px; background: #E0DED8; }
  .wf-tab.active { background: #1D9E75; opacity: 0.6; }
  .wf-score-block { margin-bottom: 14px; }
  .wf-score-lbl { width: 60px; height: 8px; background: #D0CEC8; border-radius: 3px; margin-bottom: 8px; }
  .wf-score-track { height: 8px; background: #E8E6E0; border-radius: 100px; margin-bottom: 4px; position: relative; }
  .wf-score-fill { height: 8px; border-radius: 100px; background: #1D9E75; }
  .wf-score-marker { position: absolute; top: -3px; width: 2px; height: 14px; background: #9A9890; border-radius: 1px; }
  .wf-score-val { display: inline-block; width: 80px; height: 20px; background: #F5F4F0; border: 1px solid #E0DED8; border-radius: 4px; margin-top: 2px; }
  .wf-panel-right { padding: 14px; background: white; }
  .wf-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .wf-btn { height: 28px; border-radius: 6px; border: 1.5px dashed #C8C6C0; }
  .wf-btn.primary { background: #1D9E75; border: none; opacity: 0.7; }
  .wf-notes-lbl { width: 40px; height: 8px; background: #D0CEC8; border-radius: 3px; margin-bottom: 8px; }
  .wf-notes-box { height: 60px; border: 1.5px dashed #C8C6C0; border-radius: 6px; margin-bottom: 10px; background: #FAFAF8; }
  .wf-legend { display: flex; gap: 16px; padding: 8px 14px; border-top: 1px solid #E0DED8; background: #F5F4F0; }
  .wf-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #9A9890; }
  .wf-legend-dot { width: 7px; height: 7px; border-radius: 50%; }
  .wf-annotation { font-size: 10px; color: #1D9E75; font-style: italic; margin-top: 4px; }
</style>
